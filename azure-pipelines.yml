trigger:
- main

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'

  azureServiceConnection: 'Azure-ServiceCon-FederationCred'

  location: 'centralindia'
  resourceGroupName: 'ail-iaz-rg-dev-serviceutilities'
  storageAccountName: 'ailiazstdevmystorage'
  functionAppName: 'ail-iaz-func-dev-logingestion'

steps:

- task: AzureCLI@2
  displayName: 'Create DEV Infrastructure if Not Exists'
  inputs:
    azureSubscription: '$(azureServiceConnection)'
    scriptType: 'ps'
    scriptLocation: 'inlineScript'
    inlineScript: |

      Write-Host "Checking Resource Group: $(resourceGroupName)"

      $resourceGroupExists = az group exists --name "$(resourceGroupName)"

      if ($resourceGroupExists -eq "true") {
        Write-Host "Resource Group already exists: $(resourceGroupName)"
      }
      else {
        Write-Host "Resource Group does not exist. Creating: $(resourceGroupName)"

        az group create `
          --name "$(resourceGroupName)" `
          --location "$(location)"
      }


      Write-Host "Checking Storage Account: $(storageAccountName)"

      $storageAccountExists = az storage account list `
        --resource-group "$(resourceGroupName)" `
        --query "[?name=='$(storageAccountName)'].name" `
        -o tsv

      if ($storageAccountExists) {
        Write-Host "Storage Account already exists: $(storageAccountName)"
      }
      else {
        Write-Host "Storage Account does not exist. Creating: $(storageAccountName)"

        az storage account create `
          --name "$(storageAccountName)" `
          --resource-group "$(resourceGroupName)" `
          --location "$(location)" `
          --sku Standard_LRS `
          --kind StorageV2
      }


      Write-Host "Checking Function App: $(functionAppName)"

      $functionAppExists = az functionapp list `
        --resource-group "$(resourceGroupName)" `
        --query "[?name=='$(functionAppName)'].name" `
        -o tsv

      if ($functionAppExists) {
        Write-Host "Function App already exists: $(functionAppName)"
      }
      else {
        Write-Host "Function App does not exist. Creating: $(functionAppName)"

        az functionapp create `
          --name "$(functionAppName)" `
          --resource-group "$(resourceGroupName)" `
          --storage-account "$(storageAccountName)" `
          --consumption-plan-location "$(location)" `
          --functions-version 4 `
          --runtime dotnet-isolated `
          --runtime-version 8
      }

- task: UseDotNet@2
  displayName: 'Install .NET SDK'
  inputs:
    packageType: 'sdk'
    version: '8.x'

- task: DotNetCoreCLI@2
  displayName: 'Restore'
  inputs:
    command: 'restore'
    projects: 'src/AzureLoggerFunction.sln'

- task: DotNetCoreCLI@2
  displayName: 'Build'
  inputs:
    command: 'build'
    projects: 'src/AzureLoggerFunction.sln'
    arguments: '--configuration $(buildConfiguration)'

- task: DotNetCoreCLI@2
  displayName: 'Publish'
  inputs:
    command: 'publish'
    publishWebProjects: false
    projects: 'src/AzureLoggerFunction/AzureLoggerFunction.csproj'
    arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)'
    zipAfterPublish: true

- task: PublishBuildArtifacts@1
  displayName: 'Publish Build Artifact'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'