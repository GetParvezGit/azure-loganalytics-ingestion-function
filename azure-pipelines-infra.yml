trigger: none

parameters:
- name: environment
  displayName: Environment
  type: string
  default: dev
  values:
  - dev
  - sit
  - prod

pool:
  vmImage: 'windows-latest'

variables:
- name: azureServiceConnection
  value: 'Azure-ServiceCon-FederationCred'

- name: armTemplateFile
  value: 'infra/azuredeploy.json'

- name: armParametersFile
  value: 'infra/parameters-${{ parameters.environment }}.json'

- ${{ if eq(parameters.environment, 'dev') }}:
  - group: VG-LOGINGESTION-DEV

- ${{ if eq(parameters.environment, 'sit') }}:
  - group: VG-LOGINGESTION-SIT

- ${{ if eq(parameters.environment, 'prod') }}:
  - group: VG-LOGINGESTION-PROD

steps:

- task: PowerShell@2
  displayName: 'Load Environment Configuration'
  inputs:
    targetType: 'inline'
    script: |
      $ErrorActionPreference = "Stop"

      $parametersFile = "$(Build.SourcesDirectory)/$(armParametersFile)"

      Write-Host "Loading configuration from: $parametersFile"

      $config = Get-Content $parametersFile | ConvertFrom-Json

      $resourceGroupName = $config.parameters.resourceGroupName.value
      $location = $config.parameters.location.value
      $functionAppName = $config.parameters.functionAppName.value
      $keyVaultName = $config.parameters.keyVaultName.value
      $logAnalyticsWorkspaceName = $config.parameters.logAnalyticsWorkspaceName.value
      $dcrName = $config.parameters.dcrName.value
      $customTableName = $config.parameters.customTableName.value
      $tableNameWithoutCl = $customTableName.Replace("_CL", "")

      Write-Host "Environment: ${{ parameters.environment }}"
      Write-Host "Resource Group: $resourceGroupName"
      Write-Host "Location: $location"
      Write-Host "Function App: $functionAppName"
      Write-Host "Key Vault: $keyVaultName"
      Write-Host "Log Analytics Workspace: $logAnalyticsWorkspaceName"
      Write-Host "DCR: $dcrName"
      Write-Host "Custom Table: $customTableName"
      Write-Host "Table Alias: $tableNameWithoutCl"

      Write-Host "##vso[task.setvariable variable=resourceGroupName]$resourceGroupName"
      Write-Host "##vso[task.setvariable variable=location]$location"
      Write-Host "##vso[task.setvariable variable=functionAppName]$functionAppName"
      Write-Host "##vso[task.setvariable variable=keyVaultName]$keyVaultName"
      Write-Host "##vso[task.setvariable variable=logAnalyticsWorkspaceName]$logAnalyticsWorkspaceName"
      Write-Host "##vso[task.setvariable variable=dcrName]$dcrName"
      Write-Host "##vso[task.setvariable variable=customTableName]$customTableName"
      Write-Host "##vso[task.setvariable variable=tableNameWithoutCl]$tableNameWithoutCl"

- task: AzureCLI@2
  displayName: 'Create Resource Group if Not Exists'
  inputs:
    azureSubscription: '$(azureServiceConnection)'
    scriptType: 'ps'
    scriptLocation: 'inlineScript'
    inlineScript: |
      $ErrorActionPreference = "Stop"

      Write-Host "Checking Resource Group: $(resourceGroupName)"

      $resourceGroupExists = az group exists --name "$(resourceGroupName)"

      if ($resourceGroupExists -eq "true") {
        Write-Host "Resource Group already exists: $(resourceGroupName)"
      }
      else {
        Write-Host "Resource Group does not exist. Creating: $(resourceGroupName)"

        az group create `
          --name "$(resourceGroupName)" `
          --location "$(location)"
      }

- task: AzureCLI@2
  displayName: 'Deploy ARM Template'
  inputs:
    azureSubscription: '$(azureServiceConnection)'
    scriptType: 'ps'
    scriptLocation: 'inlineScript'
    inlineScript: |
      $ErrorActionPreference = "Stop"

      Write-Host "Starting ARM deployment for environment: ${{ parameters.environment }}"

      az deployment group create `
        --resource-group "$(resourceGroupName)" `
        --template-file "$(armTemplateFile)" `
        --parameters "@$(armParametersFile)" `
        --mode Incremental

      Write-Host "ARM deployment completed successfully."

- task: AzureCLI@2
  displayName: 'Grant Pipeline Access to Key Vault'
  inputs:
    azureSubscription: '$(azureServiceConnection)'
    scriptType: 'ps'
    scriptLocation: 'inlineScript'
    addSpnToEnvironment: true
    inlineScript: |
      $ErrorActionPreference = "Stop"

      $keyVaultId = az keyvault show `
        --name "$(keyVaultName)" `
        --query id `
        -o tsv

      if ([string]::IsNullOrWhiteSpace($keyVaultId)) {
        Write-Error "Key Vault Id was not found."
        exit 1
      }

      Write-Host "Key Vault Id: $keyVaultId"
      Write-Host "Service connection application id: $env:servicePrincipalId"

      $existingAssignment = az role assignment list `
        --assignee $env:servicePrincipalId `
        --scope $keyVaultId `
        --query "[?roleDefinitionName=='Key Vault Secrets Officer'].id" `
        -o tsv

      if ([string]::IsNullOrWhiteSpace($existingAssignment)) {
        Write-Host "Assigning Key Vault Secrets Officer role to service connection."

        az role assignment create `
          --assignee $env:servicePrincipalId `
          --role "Key Vault Secrets Officer" `
          --scope $keyVaultId
      }
      else {
        Write-Host "Key Vault Secrets Officer role already exists for service connection."
      }

      Write-Host "Waiting for RBAC propagation."
      Start-Sleep -Seconds 60

- task: AzureCLI@2
  displayName: 'Create or Update Log Ingestion Secrets in Key Vault'
  inputs:
    azureSubscription: '$(azureServiceConnection)'
    scriptType: 'ps'
    scriptLocation: 'inlineScript'
    inlineScript: |
      $ErrorActionPreference = "Stop"

      $keyVaultName = "$(keyVaultName)"
      $tempDirectory = "$(Agent.TempDirectory)"

      $clientIdFile = Join-Path $tempDirectory "log-ingestion-client-id.txt"
      $clientSecretFile = Join-Path $tempDirectory "log-ingestion-client-secret.txt"
      $tenantIdFile = Join-Path $tempDirectory "log-ingestion-tenant-id.txt"

      $env:LOG_INGESTION_CLIENT_ID_VALUE | Out-File $clientIdFile -Encoding utf8 -NoNewline
      $env:LOG_INGESTION_CLIENT_SECRET_VALUE | Out-File $clientSecretFile -Encoding utf8 -NoNewline
      $env:LOG_INGESTION_TENANT_ID_VALUE | Out-File $tenantIdFile -Encoding utf8 -NoNewline

      function Sync-KeyVaultSecretFromFile {
        param (
          [string] $VaultName,
          [string] $SecretName,
          [string] $DesiredValueFile
        )

        Write-Host "Processing secret: $SecretName"

        $secretExists = az keyvault secret list `
          --vault-name $VaultName `
          --query "[?name=='$SecretName'].name" `
          -o tsv `
          --only-show-errors

        if ([string]::IsNullOrWhiteSpace($secretExists)) {
          Write-Host "Secret does not exist. Creating: $SecretName"

          az keyvault secret set `
            --vault-name $VaultName `
            --name $SecretName `
            --file $DesiredValueFile `
            --encoding utf-8 `
            --only-show-errors

          Write-Host "Secret created: $SecretName"
          return
        }

        $currentValueFile = Join-Path "$(Agent.TempDirectory)" "$SecretName-current.txt"

        az keyvault secret download `
          --vault-name $VaultName `
          --name $SecretName `
          --file $currentValueFile `
          --encoding utf-8 `
          --only-show-errors

        $currentHash = (Get-FileHash $currentValueFile -Algorithm SHA256).Hash
        $desiredHash = (Get-FileHash $DesiredValueFile -Algorithm SHA256).Hash

        if ($currentHash -eq $desiredHash) {
          Write-Host "Secret value is same. No update required: $SecretName"
          return
        }

        Write-Host "Secret value changed. Creating new version: $SecretName"

        $oldSecretId = az keyvault secret show `
          --vault-name $VaultName `
          --name $SecretName `
          --query id `
          -o tsv `
          --only-show-errors

        az keyvault secret set `
          --vault-name $VaultName `
          --name $SecretName `
          --file $DesiredValueFile `
          --encoding utf-8 `
          --only-show-errors

        Write-Host "Disabling previous version: $SecretName"

        az keyvault secret set-attributes `
          --id $oldSecretId `
          --enabled false `
          --only-show-errors
      }

      Sync-KeyVaultSecretFromFile `
        -VaultName $keyVaultName `
        -SecretName "log-ingestion-client-id" `
        -DesiredValueFile $clientIdFile

      Sync-KeyVaultSecretFromFile `
        -VaultName $keyVaultName `
        -SecretName "log-ingestion-client-secret" `
        -DesiredValueFile $clientSecretFile

      Sync-KeyVaultSecretFromFile `
        -VaultName $keyVaultName `
        -SecretName "log-ingestion-tenant-id" `
        -DesiredValueFile $tenantIdFile

      Remove-Item $clientIdFile -Force -ErrorAction SilentlyContinue
      Remove-Item $clientSecretFile -Force -ErrorAction SilentlyContinue
      Remove-Item $tenantIdFile -Force -ErrorAction SilentlyContinue

      Write-Host "Log ingestion secrets synchronized successfully."
  env:
    LOG_INGESTION_CLIENT_ID_VALUE: $(LOG_INGESTION_CLIENT_ID_VALUE)
    LOG_INGESTION_CLIENT_SECRET_VALUE: $(LOG_INGESTION_CLIENT_SECRET_VALUE)
    LOG_INGESTION_TENANT_ID_VALUE: $(LOG_INGESTION_TENANT_ID_VALUE)

- task: AzureCLI@2
  displayName: 'Assign Log Ingestion App Permissions'
  inputs:
    azureSubscription: '$(azureServiceConnection)'
    scriptType: 'ps'
    scriptLocation: 'inlineScript'
    inlineScript: |
      $ErrorActionPreference = "Stop"

      $clientId = $env:LOG_INGESTION_CLIENT_ID_VALUE

      if ([string]::IsNullOrWhiteSpace($clientId)) {
        Write-Error "LOG_INGESTION_CLIENT_ID_VALUE is empty."
        exit 1
      }

      Write-Host "Application Client Id: $clientId"

      Write-Host "Fetching Service Principal Object Id using Client Id."

      $servicePrincipalObjectId = az ad sp show `
        --id $clientId `
        --query id `
        -o tsv

      if ([string]::IsNullOrWhiteSpace($servicePrincipalObjectId)) {
        Write-Error "Service Principal Object Id was not found for client id: $clientId"
        exit 1
      }

      Write-Host "Service Principal Object Id: $servicePrincipalObjectId"

      Write-Host "Fetching DCR Id."

      $dcrId = az monitor data-collection rule show `
        --name "$(dcrName)" `
        --resource-group "$(resourceGroupName)" `
        --query id `
        -o tsv

      if ([string]::IsNullOrWhiteSpace($dcrId)) {
        Write-Error "DCR Id was not found."
        exit 1
      }

      Write-Host "Fetching Log Analytics Workspace Id."

      $workspaceId = az monitor log-analytics workspace show `
        --workspace-name "$(logAnalyticsWorkspaceName)" `
        --resource-group "$(resourceGroupName)" `
        --query id `
        -o tsv

      if ([string]::IsNullOrWhiteSpace($workspaceId)) {
        Write-Error "Log Analytics Workspace Id was not found."
        exit 1
      }

      Write-Host "DCR Id: $dcrId"
      Write-Host "Workspace Id: $workspaceId"

      Write-Host "Checking Monitoring Metrics Publisher role on DCR."

      $existingDcrAssignment = az role assignment list `
        --assignee $servicePrincipalObjectId `
        --scope $dcrId `
        --query "[?roleDefinitionName=='Monitoring Metrics Publisher'].id" `
        -o tsv

      if ([string]::IsNullOrWhiteSpace($existingDcrAssignment)) {
        Write-Host "Assigning Monitoring Metrics Publisher role on DCR."

        az role assignment create `
          --assignee-object-id $servicePrincipalObjectId `
          --assignee-principal-type ServicePrincipal `
          --role "Monitoring Metrics Publisher" `
          --scope $dcrId
      }
      else {
        Write-Host "Monitoring Metrics Publisher role already assigned on DCR."
      }

      Write-Host "Checking Log Analytics Contributor role on workspace."

      $existingWorkspaceAssignment = az role assignment list `
        --assignee $servicePrincipalObjectId `
        --scope $workspaceId `
        --query "[?roleDefinitionName=='Log Analytics Contributor'].id" `
        -o tsv

      if ([string]::IsNullOrWhiteSpace($existingWorkspaceAssignment)) {
        Write-Host "Assigning Log Analytics Contributor role on Log Analytics Workspace."

        az role assignment create `
          --assignee-object-id $servicePrincipalObjectId `
          --assignee-principal-type ServicePrincipal `
          --role "Log Analytics Contributor" `
          --scope $workspaceId
      }
      else {
        Write-Host "Log Analytics Contributor role already assigned on workspace."
      }

      Write-Host "Waiting for RBAC propagation."
      Start-Sleep -Seconds 60
  env:
    LOG_INGESTION_CLIENT_ID_VALUE: $(LOG_INGESTION_CLIENT_ID_VALUE)

- task: AzureCLI@2
  displayName: 'Grant Function App Access to Key Vault'
  inputs:
    azureSubscription: '$(azureServiceConnection)'
    scriptType: 'ps'
    scriptLocation: 'inlineScript'
    inlineScript: |
      $ErrorActionPreference = "Stop"

      $principalId = az functionapp identity show `
        --name "$(functionAppName)" `
        --resource-group "$(resourceGroupName)" `
        --query principalId `
        -o tsv

      if ([string]::IsNullOrWhiteSpace($principalId)) {
        Write-Error "Function App managed identity principal id was not found."
        exit 1
      }

      $keyVaultId = az keyvault show `
        --name "$(keyVaultName)" `
        --query id `
        -o tsv

      if ([string]::IsNullOrWhiteSpace($keyVaultId)) {
        Write-Error "Key Vault Id was not found."
        exit 1
      }

      $existingAssignment = az role assignment list `
        --assignee $principalId `
        --scope $keyVaultId `
        --query "[?roleDefinitionName=='Key Vault Secrets User'].id" `
        -o tsv

      if ([string]::IsNullOrWhiteSpace($existingAssignment)) {
        Write-Host "Assigning Key Vault Secrets User role to Function App."

        az role assignment create `
          --assignee $principalId `
          --role "Key Vault Secrets User" `
          --scope $keyVaultId
      }
      else {
        Write-Host "Key Vault Secrets User role already assigned to Function App."
      }

      Write-Host "Waiting for RBAC propagation."
      Start-Sleep -Seconds 60

- task: AzureCLI@2
  displayName: 'Restart Function App'
  inputs:
    azureSubscription: '$(azureServiceConnection)'
    scriptType: 'ps'
    scriptLocation: 'inlineScript'
    inlineScript: |
      $ErrorActionPreference = "Stop"

      az functionapp restart `
        --name "$(functionAppName)" `
        --resource-group "$(resourceGroupName)"

      Write-Host "Function App restarted successfully."
